<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rise & Vibes News Feed</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        /* 1. RESET & STREAM OPTIMIZATION */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: transparent; /* Makes it blend into your OBS layout */
            color: white; 
            font-family: 'Arial Black', 'Gadget', sans-serif; /* Thickest font available */
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
        }

        .swiper { width: 100%; height: 100%; }

        /* 2. THE SLIDE CONTAINER */
        .swiper-slide { 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #000;
        }
        
        /* 3. BACKGROUND IMAGE (The "Art") */
        .bg-image { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 1; 
            filter: brightness(0.3) contrast(1.2); /* Deep dark for text pop */
        }

        /* 4. CONTENT BOX (Centered) */
        .content { 
            position: relative;
            z-index: 2;
            width: 95%;
            text-align: center;
            /* Heavy outlines so it's readable on any background */
            text-shadow: 4px 4px 0px #000, -2px -2px 0px #000, 0px 0px 20px rgba(0,0,0,1);
        }

        /* 5. TAG (Matches your Neon Gold sign) */
        .source-tag { 
            background: #f1c40f; 
            color: black; 
            padding: 8px 20px; 
            border-radius: 4px; 
            font-size: 1.5rem; 
            font-weight: 900;
            text-transform: uppercase; 
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.5);
        }

        /* 6. THE MASSIVE HEADLINE */
        h2 { 
            font-size: 4rem; /* HUGE Font */
            line-height: 0.95;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -3px;
            word-wrap: break-word;
        }

        /* 7. PROGRESS TIMER (Thick bar at the bottom) */
        .swiper-pagination-progressbar { 
            top: auto !important; 
            bottom: 0 !important; 
            height: 12px !important; 
            background: rgba(255,255,255,0.1) !important; 
        }
        .swiper-pagination-progressbar-fill { 
            background: #f1c40f !important; /* Gold progress bar */
        }
    </style>
</head>
<body>

    <div class="swiper">
        <div class="swiper-wrapper" id="news-container">
            </div>
        <div class="swiper-pagination"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        fetch('news.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('news-container');
                
                data.forEach(story => {
                    const slide = `
                        <div class="swiper-slide">
                            <img class="bg-image" src="${story.image}" onerror="this.src='https://images.unsplash.com/photo-1586339949916-3e9457bef6d3?q=80&w=1000'">
                            <div class="content">
                                <span class="source-tag">${story.source}</span>
                                <h2>${story.title}</h2>
                            </div>
                        </div>
                    `;
                    container.innerHTML += slide;
                });

                new Swiper('.swiper', {
                    loop: true,
                    effect: 'fade', 
                    fadeEffect: { crossFade: true },
                    autoplay: { 
                        delay: 10000, /* 10 Seconds per story */
                        disableOnInteraction: false 
                    },
                    pagination: { 
                        el: '.swiper-pagination', 
                        type: 'progressbar' 
                    },
                });
            });
    </script>
</body>
</html>
