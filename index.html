<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        /* No scrollbars and transparent background for OBS */
        body { margin: 0; background: transparent; color: white; font-family: 'Arial Black', sans-serif; overflow: hidden; }
        
        .swiper { width: 100vw; height: 100vh; }
        
        .swiper-slide { 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #000; 
        }
        
        /* Darker background so the white text 'screams' */
        .bg-image { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 1;
            filter: brightness(0.3) contrast(1.2); 
        }
        
        .content { 
            position: relative; 
            z-index: 10; 
            text-align: center; 
            width: 95%; 
            /* Heavy shadow so text survives any background image */
            text-shadow: 3px 3px 0px #000, -2px -2px 0px #000, 4px 4px 10px rgba(0,0,0,1); 
        }

        .source-tag { 
            background: #f1c40f; /* Neon Gold to match your sign */
            color: #000; 
            padding: 5px 15px; 
            border-radius: 4px; 
            font-size: 1.2rem; /* Bigger source tag */
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 15px; 
            display: inline-block;
        }

        /* MASSIVE HEADLINE */
        h2 { 
            font-size: 3.5rem; /* This is the huge jump in size */
            line-height: 1.0; 
            margin: 0; 
            letter-spacing: -2px; 
            word-wrap: break-word;
            text-transform: uppercase;
        }

        /* Progress bar at the bottom to show when it will flip */
        .swiper-pagination-progressbar { top: auto !important; bottom: 0 !important; height: 10px !important; background: rgba(255,255,255,0.1) !important; }
        .swiper-pagination-progressbar-fill { background: #f1c40f !important; }
    </style>
</head>
<body>
    <div class="swiper">
        <div class="swiper-wrapper" id="news-container"></div>
        <div class="swiper-pagination"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        fetch('news.json').then(r => r.json()).then(data => {
            const container = document.getElementById('news-container');
            data.forEach(story => {
                container.innerHTML += `
                    <div class="swiper-slide">
                        <img class="bg-image" src="${story.image}" onerror="this.src='https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=600'">
                        <div class="content">
                            <span class="source-tag">${story.source}</span>
                            <h2>${story.title}</h2>
                        </div>
                    </div>`;
            });
            new Swiper('.swiper', { 
                loop: true, 
                effect: 'fade', 
                fadeEffect: { crossFade: true },
                autoplay: { delay: 10000 },
                pagination: { el: '.swiper-pagination', type: 'progressbar' }
            });
        });
    </script>
</body>
</html>
